version: '3.8'

services:
  api:
    build: .
    container_name: ai-assistant-api
    ports:
      - "8000:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - chroma_data:/tmp/chroma_db
      - chat_data:/tmp
    # 自动重启
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 日志
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chroma_data:
  chat_data:

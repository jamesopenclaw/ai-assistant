version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./:/app
      - chroma_data:/tmp/chroma_db
      - chat_data:/tmp
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  chroma_data:
  chat_data:

# Docker Compose for AI Assistant Local Development
# Usage: docker-compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: dev_password_2024
      POSTGRES_DB: ai_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ai_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (可选，如果需要)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ai-assistant-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local
